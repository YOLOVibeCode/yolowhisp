name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

      - name: Test summary
        if: always()
        run: swift test 2>&1 | grep -E "Executed|failed"
