name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: swift test

      # Signing + notarization run only when the repo has the secrets set.
      # Without them the release still builds, just unsigned.
      - name: Import Developer ID certificate
        if: ${{ secrets.MACOS_CERT_P12 != '' }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"

      - name: Build release binary (arm64)
        run: |
          swift build -c release --arch arm64
          mkdir -p dist
          cp .build/release/YOLOWhisp dist/YOLOWhisp-arm64

      - name: Build release binary (x86_64)
        run: |
          swift build -c release --arch x86_64
          cp .build/release/YOLOWhisp dist/YOLOWhisp-x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            dist/YOLOWhisp-arm64 \
            dist/YOLOWhisp-x86_64 \
            -output dist/YOLOWhisp
          chmod +x dist/YOLOWhisp

      - name: Create macOS app bundle
        run: |
          APP_DIR="dist/YOLOWhisp.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          cp dist/YOLOWhisp "$APP_DIR/MacOS/YOLOWhisp"

          cat > "$APP_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>YOLOWhisp</string>
            <key>CFBundleIdentifier</key>
            <string>com.yolovibecode.yolowhisp</string>
            <key>CFBundleName</key>
            <string>YOLOWhisp</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.version.outputs.VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.version.outputs.VERSION }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSMicrophoneUsageDescription</key>
            <string>YOLOWhisp needs microphone access for speech-to-text dictation.</string>
          </dict>
          </plist>
          PLIST

      - name: Sign (Developer ID + hardened runtime)
        if: ${{ secrets.MACOS_CERT_P12 != '' }}
        env:
          SIGN_IDENTITY: "${{ secrets.MACOS_SIGN_IDENTITY || 'Developer ID Application: NoctuSoft, Inc. (N42FM5L5KD)' }}"
        run: |
          set -euo pipefail
          # Standalone universal binary (signed, no entitlements — no Info.plist).
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" dist/YOLOWhisp
          # The app bundle, with the microphone entitlement.
          codesign --force --options runtime --timestamp \
            --entitlements scripts/YOLOWhisp.entitlements \
            --sign "$SIGN_IDENTITY" dist/YOLOWhisp.app
          codesign --verify --strict --verbose=2 dist/YOLOWhisp.app

      - name: Notarize and staple
        if: ${{ secrets.MACOS_CERT_P12 != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          ditto -c -k --keepParent dist/YOLOWhisp.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/YOLOWhisp.app
          xcrun stapler validate dist/YOLOWhisp.app

      - name: Package artifacts
        run: |
          cd dist
          # Zip the app bundle
          ditto -c -k --keepParent YOLOWhisp.app YOLOWhisp-${{ steps.version.outputs.VERSION }}-macOS.zip
          # Also provide standalone binary
          tar czf YOLOWhisp-${{ steps.version.outputs.VERSION }}-binary.tar.gz YOLOWhisp
          # Checksums
          shasum -a 256 *.zip *.tar.gz > checksums.txt

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          fi

          cat > release_notes.md << EOF
          ## YOLOWhisp v${{ steps.version.outputs.VERSION }}

          Fully local speech-to-text for macOS, powered by whisper-cpp + Metal GPU.

          ### Downloads

          | File | Description |
          |------|-------------|
          | \`YOLOWhisp-${{ steps.version.outputs.VERSION }}-macOS.zip\` | macOS app bundle (drag to /Applications) |
          | \`YOLOWhisp-${{ steps.version.outputs.VERSION }}-binary.tar.gz\` | Standalone universal binary |

          ### Prerequisites
          \`\`\`bash
          brew install whisper-cpp
          # Download a model (small recommended):
          curl -L -o ~/.local/share/whisper/ggml-small.bin \\
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
          \`\`\`

          ### Changes
          ${COMMITS}

          ### Checksums
          \`\`\`
          $(cat dist/checksums.txt)
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/YOLOWhisp-${{ steps.version.outputs.VERSION }}-macOS.zip
            dist/YOLOWhisp-${{ steps.version.outputs.VERSION }}-binary.tar.gz
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
